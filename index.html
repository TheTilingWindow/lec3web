<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
        <title class="title">Hero Coder Kareem | Lecture 3</title>
        <style>
            .row {
                margin: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container-fluid">
            <div class="jumbotron text-center">
                <h1>Hero Coder Kareem | Lecture 3</h1>
            </div>
        </div>
        <div class="container text-center">
            <div class="row text-center">
                <div class="col-sm-4">
                    <img src="https://picsum.photos/400/800" class="img-circle" width="50%" height="50%" /> 
                    <br>
                    <button class="btn btn-success btn-lg" style="margin: 10px;">Submit</button>
                </div>
                <div class="col-sm-4">
                    <img src="https://picsum.photos/400/800" class="img-rounded" width="50%" height="50%" />
                    <br>
                    <button class="btn btn-danger btn-sm" style="margin: 10px;">Submit</button>
                </div>
                <div class="col-sm-4">
                    <img src="https://picsum.photos/400/800" class="img-thumbnail" width="50%" height="50%" />
                    <br>
                    <button class="btn btn-warning btn-xs" style="margin: 10px;">Submit</button>
                </div>
            </div>
            <div class="row">
                <div class="btn-group-vertical btn-group-lg">
                    <button class="btn btn-success">
                        Purchase DELL
                    </button>
                    <button class="btn btn-warning">
                        Purchase APPLE
                    </button>
                    <button class="btn btn-danger">
                        Purchase HP
                    </button>
                </div>
            </div>
            <div class="well">
                <h3>Messages <span class="glyphicon glyphicon-envelope" style="margin: 10px;"><i class="badge">3</i></span></h3>
            </div>
            <div class="well">
                <h3>User <span class="glyphicon glyphicon-user" style="margin: 10px;"><i class="label label-success">NEW</i></span></h3>
            </div>
            <div class="progress">
                <div class="progress-bar progress-bar-success progress-bar-striped active" style="width: 90%">
                    90%
                </div>
            </div>
            <div class="progress">
                <div class="progress-bar progress-bar-success progress-bar-striped active" style="width: 40%;">40%</div>
                <div class="progress-bar progress-bar-warning progress-bar-striped active" style="width: 30%;">30%</div>
                <div class="progress-bar progress-bar-danger progress-bar-striped active" style="width: 15%;">15%</div>
            </div>
        </div>
    </body>
</html>
